<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>My Ruler</title>
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#2f3b34">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<style>
  * { box-sizing: border-box; }
  body {
    margin: 0;
    background: #0d0d0d;
    min-height: 100vh;
    font-family: Georgia, serif;
    color: #eee;
    padding: 2rem 1rem;
  }
  .page-wrap {
    position: relative;
    max-width: 1100px;
    margin: 0 auto;
  }

  /* Thin auth bar above everything else. Logged-out: email + send link.
     Logged-in: greeting + sign out. Never blocks the rest of the page. */
  .auth-bar {
    max-width: 1100px;
    margin: 0 auto 1.25rem auto;
    display: flex;
    justify-content: flex-end;
    align-items: center;
    gap: 0.5rem;
    font-size: 12px;
    color: #888;
  }
  .auth-bar input[type="email"] {
    background: #1a1a1a;
    border: 1px solid #333;
    border-radius: 6px;
    color: #eee;
    font-family: Georgia, serif;
    font-size: 12px;
    padding: 0.4rem 0.6rem;
    width: 190px;
  }
  .auth-bar input[type="email"]:focus { outline: 1px solid #c0b5a5; }
  .auth-bar button {
    padding: 0.4rem 0.8rem;
    font-size: 11px;
  }
  .auth-bar .auth-status {
    color: #c0b5a5;
  }
  .auth-bar .auth-msg {
    color: #7a9b7a;
    font-size: 11px;
  }

  .header { text-align: center; margin-bottom: 0.5rem; }
  .header h1 { font-size: 28px; margin: 0; color: #eee; }
  .header p { font-size: 14px; color: #999; margin-top: 0.4rem; }
  .header .live-clock {
    font-size: 13px;
    color: #c0b5a5;
    margin-top: 0.5rem;
    letter-spacing: 0.05em;
    font-variant-numeric: tabular-nums;
  }

  .section-label {
    font-size: 12px;
    letter-spacing: 0.1em;
    color: #c0b5a5;
    text-transform: uppercase;
    margin-bottom: 0.5rem;
  }

  .progress-row {
    display: flex;
    justify-content: space-between;
    align-items: baseline;
    margin-bottom: 0.5rem;
  }
  .progress-pct { font-size: 13px; color: #999; }

  .ruler-container {
    max-width: 1100px;
    margin: 2rem auto 1.5rem auto;
  }

  /* Sunrise / Sunset / 24h span markers above the track */
  .span-markers {
    display: flex;
    font-size: 10px;
    color: #888;
    letter-spacing: 0.05em;
    margin-bottom: 10px;
    padding: 0 1px;
    position: relative;
    height: 28px;
  }
  .span-markers .marker-start {
    position: absolute;
    left: 0;
    text-align: left;
  }
  .span-markers .marker-mid {
    position: absolute;
    left: 50%;
    transform: translateX(-50%);
    text-align: center;
  }
  .span-markers .marker-end {
    position: absolute;
    right: 0;
    text-align: right;
  }
  .span-markers .marker-sub {
    display: block;
    color: #555;
    font-size: 9px;
    margin-top: 2px;
  }

  .ruler-track {
    display: flex;
    width: 100%;
    height: 90px;
    border-radius: 8px;
    overflow: hidden;
    border: 1px solid #333;
    position: relative;
    user-select: none;
    touch-action: none;
  }

  .ruler-block {
    position: relative;
    background: #2f3b34;
    border-right: 1px solid #000;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    overflow: hidden;
    transition: background 0.2s;
  }
  .ruler-block:last-child { border-right: none; }
  .ruler-block.sleep-zone { background: #5a2323; }
  .ruler-block.current { box-shadow: inset 0 0 0 2px #c0b5a5; }

  .ruler-block .block-name {
    font-size: 12px;
    color: #ddd;
    font-weight: 500;
    text-align: center;
    padding: 0 4px;
    outline: none;
    cursor: text;
    max-width: 100%;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .ruler-block .block-mins {
    font-size: 10px;
    color: #aab;
    margin-top: 2px;
  }
  .ruler-block.sleep-zone .block-mins { color: #c99; }

  .ruler-block .fill-overlay {
    position: absolute;
    bottom: 0;
    left: 0;
    height: 100%;
    width: 0%;
    background: rgba(255,255,255,0.15);
    pointer-events: none;
  }

  /* Resize handles: wider invisible hit-area on touch, thin visible line */
  .resize-handle {
    position: absolute;
    top: 0;
    right: -12px;
    width: 24px;
    height: 100%;
    cursor: col-resize;
    z-index: 5;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .resize-handle::after {
    content: '';
    width: 3px;
    height: 36px;
    background: rgba(255,255,255,0.25);
    border-radius: 2px;
  }
  .resize-handle:hover::after,
  .resize-handle.dragging::after { background: #c0b5a5; }

  /* Do-not-disturb icon toggle, top-right corner of each block */
  .sleep-toggle {
    position: absolute;
    top: 4px;
    right: 4px;
    width: 20px;
    height: 20px;
    border-radius: 50%;
    border: 1.5px solid #666;
    background: rgba(0,0,0,0.35);
    cursor: pointer;
    z-index: 6;
    user-select: none;
  }
  .sleep-toggle::after {
    content: '';
    position: absolute;
    top: 50%;
    left: 12%;
    right: 12%;
    height: 1.5px;
    background: #777;
    transform: rotate(45deg);
    transform-origin: center;
  }
  .sleep-toggle:hover { border-color: #c0b5a5; }
  .sleep-toggle:hover::after { background: #c0b5a5; }
  .ruler-block.sleep-zone .sleep-toggle { border-color: #e8b4b4; background: rgba(0,0,0,0.45); }
  .ruler-block.sleep-zone .sleep-toggle::after { background: #e8b4b4; }

  .current-block-info {
    max-width: 1100px;
    margin: 0 auto 1.5rem auto;
    display: flex;
    justify-content: space-between;
    align-items: baseline;
  }
  .current-block-info .cb-name { font-size: 16px; color: #c0b5a5; }
  .current-block-info .cb-time { font-size: 13px; color: #888; }

  /* Two-column area: Journal Notes (left, slightly smaller/personal) + Musts & In-between (right) */
  .panels-row {
    max-width: 1100px;
    margin: 0 auto;
    display: flex;
    gap: 1.25rem;
    flex-wrap: wrap;
    align-items: flex-start;
  }
  .panel-col-notes {
    flex: 1 1 320px;
    min-width: 260px;
  }
  .panel-col-musts {
    flex: 0 1 240px;
    width: 240px;
    min-width: 220px;
  }

  textarea {
    width: 100%;
    min-height: 110px;
    background: #1a1a1a;
    border: 1px solid #333;
    border-radius: 8px;
    color: #eee;
    font-family: Georgia, serif;
    font-size: 13px;
    padding: 0.75rem;
    resize: vertical;
  }
  textarea:focus { outline: 1px solid #c0b5a5; }

  .btn-row { display: flex; gap: 0.6rem; margin-top: 0.75rem; }
  button {
    padding: 0.55rem 1rem;
    border: none;
    border-radius: 6px;
    background: #c0b5a5;
    color: #1a1a1a;
    font-weight: bold;
    font-size: 12px;
    cursor: pointer;
    font-family: Georgia, serif;
  }
  button:hover { background: #d0c5b5; }
  button.secondary { background: #2a2a2a; color: #ccc; }
  button.secondary:hover { background: #3a3a3a; }
  button.combo-btn { margin: 0 auto; display: block; }

  /* Musts & In-between — a quiet plain-text reminder list, no checkboxes */
  .musts-box {
    background: #161616;
    border: 1px solid #2a2a2a;
    border-radius: 8px;
    padding: 0.75rem;
    min-height: 90px;
  }
  .must-item {
    display: flex;
    align-items: baseline;
    gap: 0.4rem;
    padding: 0.35rem 0.1rem;
    font-size: 12px;
    color: #bbb;
    border-bottom: 1px solid #232323;
  }
  .must-item:last-child { border-bottom: none; }
  .must-item .must-label { flex: 1; }
  .must-item .must-note { font-size: 10px; color: #666; }
  .must-add-row { display: flex; gap: 0.4rem; margin-top: 0.5rem; }
  .must-add-row input[type="text"] {
    flex: 1;
    background: #1a1a1a;
    border: 1px solid #333;
    border-radius: 6px;
    color: #eee;
    font-family: Georgia, serif;
    font-size: 12px;
    padding: 0.45rem 0.6rem;
  }
  .must-add-row input[type="text"]:focus { outline: 1px solid #c0b5a5; }
  .must-add-row button { padding: 0.45rem 0.8rem; }
  .must-remove {
    background: none;
    border: none;
    color: #666;
    cursor: pointer;
    font-size: 14px;
    padding: 0 0.2rem;
    flex: 0;
  }
  .must-remove:hover { color: #c77; background: none; }

  /* Tackle / Whiteboard box, fixed top right corner of page-wrap */
  .tackle-wrap {
    position: absolute;
    top: 0;
    right: 0;
    z-index: 10;
  }
  .tackle-box {
    width: 240px;
    background: #161616;
    border: 1px solid #3a3327;
    border-radius: 8px;
    padding: 0.75rem;
  }
  .tackle-box .section-label { font-size: 11px; margin-bottom: 0.4rem; }
  .tackle-box textarea {
    min-height: 80px;
    font-size: 12px;
    padding: 0.6rem;
  }
  .tackle-share-row {
    display: flex;
    align-items: center;
    gap: 0.35rem;
    margin-top: 0.5rem;
    font-size: 11px;
    color: #888;
  }
  .tackle-share-row input[type="checkbox"] {
    accent-color: #c0b5a5;
    cursor: pointer;
  }

  .bottom-row {
    max-width: 1100px;
    margin: 2rem auto 0 auto;
    display: flex;
    gap: 1.5rem;
    flex-wrap: wrap;
    align-items: flex-start;
  }

  .entries-list {
    flex: 1 1 380px;
    min-width: 280px;
  }
  .entry-item {
    background: #161616;
    border: 1px solid #2a2a2a;
    border-radius: 6px;
    padding: 0.85rem;
    margin-bottom: 0.6rem;
  }
  .entry-date { font-size: 11px; color: #c0b5a5; margin-bottom: 0.4rem; }
  .entry-text { font-size: 12px; color: #ccc; white-space: pre-wrap; }

  .clans-col {
    flex: 1 1 380px;
    min-width: 280px;
  }

  /* ---- Clans (Phase 2) ---- */
  .clans-section {
    background: #161616;
    border: 1px solid #2a2a2a;
    border-radius: 8px;
    padding: 1rem;
  }
  .clans-header-row {
    display: flex;
    justify-content: space-between;
    align-items: center;
    flex-wrap: wrap;
    gap: 0.75rem;
    margin-bottom: 0.75rem;
  }
  .clans-actions {
    display: flex;
    gap: 0.5rem;
    align-items: center;
  }
  .clans-actions input[type="text"] {
    background: #1a1a1a;
    border: 1px solid #333;
    border-radius: 6px;
    color: #eee;
    font-family: Georgia, serif;
    font-size: 12px;
    padding: 0.45rem 0.6rem;
    width: 130px;
  }
  .clans-actions input[type="text"]:focus { outline: 1px solid #c0b5a5; }
  .clans-actions button { padding: 0.45rem 0.8rem; font-size: 11px; white-space: nowrap; }

  .clans-msg {
    font-size: 12px;
    color: #7a9b7a;
    margin-bottom: 0.75rem;
    min-height: 1em;
  }
  .clans-msg.error { color: #c77; }

  .clan-card {
    background: #161616;
    border: 1px solid #2a2a2a;
    border-radius: 8px;
    padding: 1rem;
    margin-bottom: 1.25rem;
  }
  .clan-card-header {
    display: flex;
    justify-content: space-between;
    align-items: baseline;
    margin-bottom: 0.75rem;
    flex-wrap: wrap;
    gap: 0.5rem;
  }
  .clan-card-header .clan-name { font-size: 16px; color: #c0b5a5; }
  .clan-card-header .clan-meta { font-size: 11px; color: #777; }
  .clan-card-header .clan-leave {
    background: none;
    border: 1px solid #444;
    color: #888;
    font-size: 10px;
    padding: 0.3rem 0.6rem;
  }
  .clan-card-header .clan-leave:hover { border-color: #c77; color: #c77; }

  .clan-member {
    margin-bottom: 1rem;
  }
  .clan-member:last-child { margin-bottom: 0; }
  .clan-member-row {
    display: flex;
    justify-content: space-between;
    align-items: baseline;
    margin-bottom: 0.35rem;
  }
  .clan-member-name { font-size: 13px; color: #ddd; }
  .clan-member-time { font-size: 12px; color: #999; font-variant-numeric: tabular-nums; }
  .clan-member-time.is-night { color: #555; }

  .clan-mini-track {
    display: flex;
    width: 100%;
    height: 28px;
    border-radius: 5px;
    overflow: hidden;
    border: 1px solid #2a2a2a;
  }
  .clan-mini-block {
    background: #2f3b34;
    border-right: 1px solid #000;
    position: relative;
  }
  .clan-mini-block:last-child { border-right: none; }
  .clan-mini-block.sleep-zone { background: #5a2323; }
  .clan-mini-block .mini-fill {
    position: absolute;
    bottom: 0;
    left: 0;
    height: 100%;
    width: 0%;
    background: rgba(255,255,255,0.15);
  }

  .clans-locked {
    background: #161616;
    border: 1px solid #2a2a2a;
    border-radius: 8px;
    padding: 1rem;
  }
  .clans-locked p {
    font-size: 12px;
    color: #666;
    margin-top: 0.5rem;
  }

  @media (max-width: 700px) {
    body { padding: 1.25rem 0.75rem; }
    .tackle-wrap { position: static; display: flex; justify-content: center; margin-bottom: 1rem; }
    .tackle-box { width: 100%; max-width: 280px; }
    .resize-handle { right: -14px; width: 28px; }
    .clans-actions input[type="text"] { width: 100px; }
  }
</style>
</head>
<body>

<div class="auth-bar" id="authBar">
  <!-- Filled in by JS depending on logged-in/out state -->
</div>

<div class="page-wrap">
  <div class="header">
    <h1>My Ruler</h1>
    <p>Your 12-block day planner</p>
    <div class="live-clock" id="liveClock">—</div>
  </div>

  <div class="tackle-wrap">
    <div class="tackle-box">
      <span class="section-label">Tackle — Whiteboard</span>
      <textarea id="tackleArea" placeholder="Jot a quick reminder..."></textarea>
      <div class="tackle-share-row">
        <input type="checkbox" id="tackleShare">
        <label for="tackleShare">Share</label>
      </div>
    </div>
  </div>
</div>

<div class="ruler-container">
  <div class="progress-row">
    <span class="section-label">Today's Ruler</span>
    <span class="progress-pct" id="dayProgress">0% elapsed</span>
  </div>
  <div class="span-markers">
    <span class="marker-start">Sunrise<span class="marker-sub">6:00 AM</span></span>
    <span class="marker-mid">Sunset<span class="marker-sub">≈ Block 6</span></span>
    <span class="marker-end">+24h</span>
  </div>
  <div class="ruler-track" id="rulerTrack"></div>
</div>

<div class="current-block-info">
  <span class="cb-name" id="currentBlockName">—</span>
  <span class="cb-time" id="currentBlockTime">—</span>
</div>

<div class="panels-row">
  <div class="panel-col-notes">
    <span class="section-label">Journal Notes</span>
    <textarea id="workArea" placeholder="Write your day here..."></textarea>
    <div class="btn-row" style="justify-content:center;">
      <button id="saveBtn" class="combo-btn">Save Entry / New Day</button>
    </div>
  </div>

  <div class="panel-col-musts">
    <span class="section-label">Musts &amp; In-between</span>
    <div class="musts-box" id="mustsBox"></div>
  </div>
</div>

<div class="bottom-row">
  <div class="entries-list">
    <span class="section-label">Past Entries</span>
    <div id="entriesList"></div>
  </div>

  <div class="clans-col">
    <div class="clans-section" id="clansSection" style="display:none;">
      <div class="clans-header-row">
        <span class="section-label">Clans</span>
        <div class="clans-actions">
          <input type="text" id="joinCodeInput" placeholder="Invite code">
          <button id="joinClanBtn" class="secondary">Join</button>
          <button id="createClanBtn">+ Create Clan</button>
        </div>
      </div>
      <div class="clans-msg" id="clansMsg"></div>
      <div id="clansList"></div>
    </div>

    <div class="clans-locked" id="clansLocked">
      <span class="section-label">Clans</span>
      <p>Sign in above to join or create a Clan and see your team's Rulers.</p>
    </div>
  </div>
</div>

<script>
var TOTAL_MIN = 1440;
var NUM_BLOCKS = 12;
var DEFAULT_SIZE = TOTAL_MIN / NUM_BLOCKS; // 120
var DAY_START_OFFSET = 360; // 6am reference

var STORAGE_KEY = 'csrAlignBlocks';
var ENTRIES_KEY = 'csrAlignEntries';
var TODAY_KEY = 'csrAlignTodayEntry';
var MUSTS_KEY = 'csrAlignMusts';
var TACKLE_KEY = 'csrAlignTackle';

// ---- Load or initialize block data ----
// Each block: { name, minutes, sleep: true/false }
function loadBlocks() {
  var saved = localStorage.getItem(STORAGE_KEY);
  if (saved) {
    try {
      var parsed = JSON.parse(saved);
      if (parsed.length === NUM_BLOCKS) {
        parsed.forEach(function(b) { if (typeof b.sleep === 'undefined') b.sleep = false; });
        return parsed;
      }
    } catch(e) {}
  }
  var blocks = [];
  for (var i = 0; i < NUM_BLOCKS; i++) {
    blocks.push({ name: 'Block ' + (i+1), minutes: DEFAULT_SIZE, sleep: false });
  }
  return blocks;
}

function saveBlocks() {
  localStorage.setItem(STORAGE_KEY, JSON.stringify(blocks));
  // If logged in, push the update live so clan members see it instantly.
  if (typeof pushMyRulerToSupabase === 'function') pushMyRulerToSupabase();
}

var blocks = loadBlocks();

// ---- Render the ruler ----
var rulerTrack = document.getElementById('rulerTrack');
var blockEls = [];

function renderRuler() {
  rulerTrack.innerHTML = '';
  blockEls = [];

  var cumulative = 0;
  var startPositions = [];
  blocks.forEach(function(b) {
    startPositions.push(cumulative);
    cumulative += b.minutes;
  });

  blocks.forEach(function(b, idx) {
    var widthPct = (b.minutes / TOTAL_MIN) * 100;
    var startMin = startPositions[idx];
    var endMin = startMin + b.minutes;

    var el = document.createElement('div');
    el.className = 'ruler-block' + (b.sleep ? ' sleep-zone' : '');
    el.style.width = widthPct + '%';

    var nameSpan = document.createElement('div');
    nameSpan.className = 'block-name';
    nameSpan.contentEditable = true;
    nameSpan.textContent = b.name;
    nameSpan.spellcheck = false;
    nameSpan.addEventListener('blur', function() {
      blocks[idx].name = nameSpan.textContent.trim() || ('Block ' + (idx+1));
      saveBlocks();
      updateCurrentBlockInfo();
    });
    nameSpan.addEventListener('keydown', function(e) {
      if (e.key === 'Enter') { e.preventDefault(); nameSpan.blur(); }
    });
    nameSpan.addEventListener('mousedown', function(e){ e.stopPropagation(); });
    nameSpan.addEventListener('touchstart', function(e){ e.stopPropagation(); });

    var minsSpan = document.createElement('div');
    minsSpan.className = 'block-mins';
    minsSpan.textContent = Math.round(b.minutes) + ' min';

    var fillOverlay = document.createElement('div');
    fillOverlay.className = 'fill-overlay';

    var sleepToggle = document.createElement('div');
    sleepToggle.className = 'sleep-toggle';
    sleepToggle.title = b.sleep ? 'Marked as sleep — tap to unmark' : 'Mark as sleep block';
    sleepToggle.addEventListener('mousedown', function(e){ e.stopPropagation(); });
    sleepToggle.addEventListener('touchstart', function(e){ e.stopPropagation(); }, {passive: true});
    sleepToggle.addEventListener('click', function(e) {
      e.stopPropagation();
      blocks[idx].sleep = !blocks[idx].sleep;
      saveBlocks();
      renderRuler();
      updateLive();
    });

    el.appendChild(fillOverlay);
    el.appendChild(nameSpan);
    el.appendChild(minsSpan);
    el.appendChild(sleepToggle);

    if (idx < blocks.length - 1) {
      var handle = document.createElement('div');
      handle.className = 'resize-handle';
      handle.dataset.idx = idx;
      el.appendChild(handle);
    }

    rulerTrack.appendChild(el);
    blockEls.push({ el: el, fill: fillOverlay, mins: minsSpan, startMin: startMin, endMin: endMin });
  });

  attachDragHandlers();
}

 // ---- Drag to resize adjacent blocks (mouse + touch, full-track friendly) ----
var MIN_BLOCK_MIN = 10;

function attachDragHandlers() {
  var handles = rulerTrack.querySelectorAll('.resize-handle');
  handles.forEach(function(handle) {
    handle.addEventListener('mousedown', function(e) {
      e.preventDefault();
      var idx = parseInt(handle.dataset.idx);
      startDrag(idx, e.clientX, handle);
    });
    handle.addEventListener('touchstart', function(e) {
      e.preventDefault();
      var idx = parseInt(handle.dataset.idx);
      startDrag(idx, e.touches[0].clientX, handle);
    }, {passive: false});
  });
}

function startDrag(idx, startX, handleEl) {
  handleEl.classList.add('dragging');
  var trackRect = rulerTrack.getBoundingClientRect();
  var trackWidthPx = trackRect.width;
  var minPerPx = TOTAL_MIN / trackWidthPx;

  var leftBlock = blocks[idx];
  var rightBlock = blocks[idx+1];
  var leftStart = leftBlock.minutes;
  var rightStart = rightBlock.minutes;

  function onMove(clientX) {
    var deltaPx = clientX - startX;
    var deltaMin = deltaPx * minPerPx;

    var newLeft = leftStart + deltaMin;
    var newRight = rightStart - deltaMin;

    if (newLeft < MIN_BLOCK_MIN) {
      newRight -= (MIN_BLOCK_MIN - newLeft);
      newLeft = MIN_BLOCK_MIN;
    }
    if (newRight < MIN_BLOCK_MIN) {
      newLeft -= (MIN_BLOCK_MIN - newRight);
      newRight = MIN_BLOCK_MIN;
    }
    if (newLeft < MIN_BLOCK_MIN) newLeft = MIN_BLOCK_MIN;

    leftBlock.minutes = newLeft;
    rightBlock.minutes = newRight;
    renderRuler();
    updateLive();
  }

  function mouseMoveHandler(e) { onMove(e.clientX); }
  function touchMoveHandler(e) { e.preventDefault(); onMove(e.touches[0].clientX); }
  function endHandler() {
    document.removeEventListener('mousemove', mouseMoveHandler);
    document.removeEventListener('mouseup', endHandler);
    document.removeEventListener('touchmove', touchMoveHandler);
    document.removeEventListener('touchend', endHandler);
    saveBlocks();
  }

  document.addEventListener('mousemove', mouseMoveHandler);
  document.addEventListener('mouseup', endHandler);
  document.addEventListener('touchmove', touchMoveHandler, {passive: false});
  document.addEventListener('touchend', endHandler);
}

function getSinceSix() {
  var now = new Date();
  var realMinutes = now.getHours()*60 + now.getMinutes() + now.getSeconds()/60;
  return (realMinutes - DAY_START_OFFSET + 1440) % 1440;
}

function updateCurrentBlockInfo() {
  var sinceSix = getSinceSix();
  var idx = findCurrentBlockIndex(sinceSix);
  if (idx === -1) return;
  var b = blocks[idx];
  var be = blockEls[idx];
  var elapsedInBlock = sinceSix - be.startMin;
  document.getElementById('currentBlockName').textContent = b.name;
  document.getElementById('currentBlockTime').textContent = Math.round(elapsedInBlock) + ' / ' + Math.round(b.minutes) + ' min';
}

function findCurrentBlockIndex(sinceSix) {
  for (var i = 0; i < blockEls.length; i++) {
    if (sinceSix >= blockEls[i].startMin && sinceSix < blockEls[i].endMin) return i;
  }
  return blockEls.length - 1;
}

function updateLiveClock() {
  var now = new Date();
  var timeStr = now.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit', second: '2-digit' });
  document.getElementById('liveClock').textContent = timeStr;
}

function updateLive() {
  updateLiveClock();
  var sinceSix = getSinceSix();
  var idx = findCurrentBlockIndex(sinceSix);

  blockEls.forEach(function(be, i) {
    be.el.classList.remove('current');
    if (i === idx) {
      be.el.classList.add('current');
      var elapsed = sinceSix - be.startMin;
      var pct = (elapsed / (be.endMin - be.startMin)) * 100;
      be.fill.style.width = pct + '%';
    } else if (sinceSix >= be.endMin) {
      be.fill.style.width = '100%';
    } else {
      be.fill.style.width = '0%';
    }
  });

  updateCurrentBlockInfo();

  var dayPct = (sinceSix / TOTAL_MIN) * 100;
  document.getElementById('dayProgress').textContent = Math.round(dayPct) + '% elapsed';
}

function loadEntries() {

  if (saved) {
    try { return JSON.parse(saved); } catch(e) { return []; }
  }
  return [];
}

function saveEntries(entries) {
  localStorage.setItem(ENTRIES_KEY, JSON.stringify(entries));
}

function renderEntries() {
  var entries = loadEntries();
  var container = document.getElementById('entriesList');
  container.innerHTML = '';
  entries.slice().reverse().forEach(function(entry) {
    var div = document.createElement('div');
    div.className = 'entry-item';
    var dateDiv = document.createElement('div');
    dateDiv.className = 'entry-date';
    dateDiv.textContent = entry.date;
    var textDiv = document.createElement('div');
    textDiv.className = 'entry-text';
    textDiv.textContent = entry.text;
    div.appendChild(dateDiv);
    div.appendChild(textDiv);
    container.appendChild(div);

var workArea = document.getElementById('workArea');

function loadTodayDraft() {
  var saved = localStorage.getItem(TODAY_KEY);
  if (saved) workArea.value = saved;
}
function saveTodayDraft() {
  localStorage.setItem(TODAY_KEY, workArea.value);
}

workArea.addEventListener('input', saveTodayDraft);

// Combined Save Entry / New Day button
document.getElementById('saveBtn').addEventListener('click', function() {
  saveTodayDraft();
  if (workArea.value.trim()) {
    var entries = loadEntries();
    var today = new Date();
    var dateStr = today.toLocaleDateString() + ' ' + today.toLocaleTimeString();

var DEFAULT_MUSTS = [
  { id: 'sleep', label: 'Sleep', note: 'recommended 420 min', fixed: true },
  { id: 'sunlight', label: 'Sunlight', note: '', fixed: true },
  { id: 'exercise', label: 'Exercise', note: '', fixed: true }
];

function loadMusts() {
  var saved = localStorage.getItem(MUSTS_KEY);
  if (saved) {
    try {
      var parsed = JSON.parse(saved);
      if (Array.isArray(parsed) && parsed.length) {
        // migrate: drop the retired "Eat right" fixed item if present from an earlier version
        parsed = parsed.filter(function(m) { return m.id !== 'eat'; });
        return parsed;
      }
    } catch(e) {}
  }
  return DEFAULT_MUSTS.map(function(m){ return Object.assign({}, m); });
}

function saveMusts() {
  localStorage.setItem(MUSTS_KEY, JSON.stringify(musts));
}

var musts = loadMusts();
var mustsBox = document.getElementById('mustsBox');

function renderMusts() {
  mustsBox.innerHTML = '';
  musts.forEach(function(m, idx) {
    var row = document.createElement('div');
    row.className = 'must-item';

    var label = document.createElement('span');
    label.className = 'must-label';
    label.textContent = m.label;
    row.appendChild(label);

    if (m.note) {
      var note = document.createElement('span');
      note.className = 'must-note';
      note.textContent = m.note;
      row.appendChild(note);
    }

    if (!m.fixed) {
      var rm = document.createElement('button');
      rm.className = 'must-remove';
      rm.textContent = '✕';
      rm.title = 'Remove';
      rm.addEventListener('click', function() {
        musts.splice(idx, 1);
        saveMusts();
        renderMusts();
      });
      row.appendChild(rm);
    }

    mustsBox.appendChild(row);
  });

  var addRow = document.createElement('div');
  addRow.className = 'must-add-row';
  var input = document.createElement('input');
  input.type = 'text';
  input.placeholder = 'Add another...';
  var addBtn = document.createElement('button');
  addBtn.textContent = '+';
  function addMust() {
    var val = input.value.trim();
    if (!val) return;
    musts.push({ id: 'custom-' + Date.now(), label: val, note: '', fixed: false });
    saveMusts();
    renderMusts();
  }
  addBtn.addEventListener('click', addMust);
  input.addEventListener('keydown', function(e) {
    if (e.key === 'Enter') { e.preventDefault(); addMust(); }
  });
  addRow.appendChild(input);
  addRow.appendChild(addBtn);
  mustsBox.appendChild(addRow);
}

function sendMagicLink(email) {
  if (!supabaseClient) {
    renderAuthBarLoggedOut('Login is temporarily unavailable.');
    return;
  }
  if (!email || email.indexOf('@') === -1) {
    renderAuthBarLoggedOut('Enter a valid email first.');
    return;

  supabaseClient.auth.signInWithOtp({
    email: email,
    options: { emailRedirectTo: window.location.href }
  }).then(function(result) {
    if (result.error) {
      renderAuthBarLoggedOut('Could not send link: ' + result.error.message);
    } else {
      renderAuthBarLoggedOut('Check your email for the link!');

}

function initAuth() {
  if (!supabaseClient) {
    renderAuthBarLoggedOut();
    showClansLocked();
    return;

  supabaseClient.auth.getSession().then(function(result) {
    var session = result.data && result.data.session;
    if (session && session.user) {
      renderAuthBarLoggedIn(session.user.email);
      ensureProfileTimezone(session.user);
      currentUser = session.user;
      showClansUnlocked();
      loadAndRenderClans();
      pushMyRulerToSupabase();
    } else {
      renderAuthBarLoggedOut();
      showClansLocked();
    }
  });

  supabaseClient.auth.onAuthStateChange(function(event, session) {
    if (session && session.user) {
      renderAuthBarLoggedIn(session.user.email);
      ensureProfileTimezone(session.user);
      currentUser = session.user;
      showClansUnlocked();
      loadAndRenderClans();
      pushMyRulerToSupabase();
    } else {
      currentUser = null;
      renderAuthBarLoggedOut();
      showClansLocked();
    }
  });
}

// Clans — create, join, view live member rulers
// (Journal entries are never part of this. Only block layout.)
// ============================================================
var currentUser = null;
var clansSection = document.getElementById('clansSection');
var clansLocked = document.getElementById('clansLocked');
var clansMsgEl = document.getElementById('clansMsg');
var clansListEl = document.getElementById('clansList');

function showClansUnlocked() {
  clansSection.style.display = '';
  clansLocked.style.display = 'none';
}
function showClansLocked() {
  clansSection.style.display = 'none';
  clansLocked.style.display = '';
}

function showClansMsg(text, isError) {
  clansMsgEl.textContent = text || '';
  clansMsgEl.className = 'clans-msg' + (isError ? ' error' : '');
}

// Push this person's current Ruler blocks up to Supabase so clan
// members can see it live. Called whenever blocks change.
function pushMyRulerToSupabase() {
  if (!supabaseClient || !currentUser) return;
  supabaseClient.from('shared_rulers')
    .upsert({ user_id: currentUser.id, blocks: blocks, updated_at: new Date().toISOString() })
    .then(function(){});
}

document.getElementById('createClanBtn').addEventListener('click', function() {
  if (!supabaseClient || !currentUser) return;
  var name = window.prompt('Name this clan:');
  if (!name || !name.trim()) return;

  supabaseClient.from('clans')
    .insert({ name: name.trim(), owner_id: currentUser.id })
    .select()
    .then(function(result) {
      if (result.error) {
        if (result.error.message.indexOf('row-level security') !== -1 || result.error.code === '42501') {
          showClansMsg('Creating clans is a paid feature. Upgrade to create your own.', true);
        } else {
          showClansMsg('Could not create clan: ' + result.error.message, true);
        }
        return;
      }
      var newClan = result.data && result.data[0];
      if (newClan) {
        // Owner auto-joins their own clan
        supabaseClient.from('clan_members')
          .insert({ clan_id: newClan.id, user_id: currentUser.id })
          .then(function() {
            showClansMsg('Clan "' + newClan.name + '" created! Invite code: ' + newClan.invite_code);
            loadAndRenderClans();
          });
      }
    });
});

document.getElementById('joinClanBtn').addEventListener('click', function() {
  if (!supabaseClient || !currentUser) return;
  var code = document.getElementById('joinCodeInput').value.trim();
  if (!code) { showClansMsg('Enter an invite code first.', true); return; }

  supabaseClient.from('clans')
    .select('id, name')
    .eq('invite_code', code)
    .then(function(result) {
      if (result.error || !result.data || !result.data.length) {
        showClansMsg('No clan found with that code.', true);
        return;
      }
      var clan = result.data[0];
      supabaseClient.from('clan_members')
        .insert({ clan_id: clan.id, user_id: currentUser.id })
        .then(function(insertResult) {
          if (insertResult.error) {
            if (insertResult.error.message.indexOf('Free tier') !== -1) {
              showClansMsg('Free tier is limited to 2 clans. Upgrade to join more.', true);
            } else if (insertResult.error.code === '23505') {
              showClansMsg('You\'re already in that clan.', true);
            } else {
              showClansMsg('Could not join: ' + insertResult.error.message, true);
            }
            return;
          }
          showClansMsg('Joined "' + clan.name + '"!');
          document.getElementById('joinCodeInput').value = '';
          loadAndRenderClans();
        });
    });
});

function loadAndRenderClans() {
  if (!supabaseClient || !currentUser) return;

  supabaseClient.from('clan_members')
    .select('clan_id')
    .eq('user_id', currentUser.id)
    .then(function(memberResult) {
      if (memberResult.error || !memberResult.data) return;
      var clanIds = memberResult.data.map(function(r) { return r.clan_id; });

      if (!clanIds.length) {
        clansListEl.innerHTML = '<p style="font-size:12px;color:#666;">You haven\'t joined a clan yet.</p>';
        return;
      }

      supabaseClient.from('clans')
        .select('id, name, invite_code, owner_id')
        .in('id', clanIds)
        .then(function(clansResult) {
          if (clansResult.error || !clansResult.data) return;
          renderClansList(clansResult.data);
        });
    });
}

function renderClansList(clanRows) {
  clansListEl.innerHTML = '';
  clanRows.forEach(function(clan) {
    renderOneClanCard(clan);
  });
}

function renderOneClanCard(clan) {
  var card = document.createElement('div');
  card.className = 'clan-card';

  var header = document.createElement('div');
  header.className = 'clan-card-header';

  var nameEl = document.createElement('div');
  nameEl.className = 'clan-name';
  nameEl.textContent = clan.name;

  var metaEl = document.createElement('div');
  metaEl.className = 'clan-meta';
  metaEl.textContent = 'Invite code: ' + clan.invite_code;

  var leaveBtn = document.createElement('button');
  leaveBtn.className = 'clan-leave';
  leaveBtn.textContent = clan.owner_id === currentUser.id ? 'Disband' : 'Leave';
  leaveBtn.addEventListener('click', function() {
    if (!window.confirm('Are you sure?')) return;
    if (clan.owner_id === currentUser.id) {
      supabaseClient.from('clans').delete().eq('id', clan.id).then(function() { loadAndRenderClans(); });
    } else {
      supabaseClient.from('clan_members').delete().eq('clan_id', clan.id).eq('user_id', currentUser.id).then(function() { loadAndRenderClans(); });
    }
  });

  header.appendChild(nameEl);
  header.appendChild(metaEl);
  header.appendChild(leaveBtn);
  card.appendChild(header);

  var membersWrap = document.createElement('div');
  membersWrap.id = 'clanMembers-' + clan.id;
  card.appendChild(membersWrap);

  clansListEl.appendChild(card);

  // Load this clan's members and their shared rulers
  supabaseClient.from('clan_members')
    .select('user_id')
    .eq('clan_id', clan.id)
    .then(function(memResult) {
      if (memResult.error || !memResult.data) return;
      var userIds = memResult.data.map(function(r) { return r.user_id; });

      supabaseClient.from('profiles')
        .select('id, display_name, timezone')
        .in('id', userIds)
        .then(function(profResult) {
          if (profResult.error || !profResult.data) return;

          supabaseClient.from('shared_rulers')
            .select('user_id, blocks')
            .in('user_id', userIds)
            .then(function(rulerResult) {
              var rulerMap = {};
              if (rulerResult.data) {
                rulerResult.data.forEach(function(r) { rulerMap[r.user_id] = r.blocks; });
              }
              renderClanMembers(membersWrap, profResult.data, rulerMap);
            });
        });
    });

  // Live updates: whenever anyone's shared ruler changes, re-render this clan
  supabaseClient.channel('clan-' + clan.id)
    .on('postgres_changes', { event: '*', schema: 'public', table: 'shared_rulers' }, function() {
      renderOneClanCardRefresh(clan, membersWrap);
    })
    .subscribe();
}

function renderOneClanCardRefresh(clan, membersWrap) {
  supabaseClient.from('clan_members')
    .select('user_id')
    .eq('clan_id', clan.id)
    .then(function(memResult) {
      if (memResult.error || !memResult.data) return;
      var userIds = memResult.data.map(function(r) { return r.user_id; });

      supabaseClient.from('profiles')
        .select('id, display_name, timezone')
        .in('id', userIds)
        .then(function(profResult) {
          if (profResult.error || !profResult.data) return;
          supabaseClient.from('shared_rulers')
            .select('user_id, blocks')
            .in('user_id', userIds)
            .then(function(rulerResult) {
              var rulerMap = {};
              if (rulerResult.data) {
                rulerResult.data.forEach(function(r) { rulerMap[r.user_id] = r.blocks; });
              }
              renderClanMembers(membersWrap, profResult.data, rulerMap);
            });
        });
    });
}

function renderClanMembers(container, profiles, rulerMap) {
  container.innerHTML = '';
  profiles.forEach(function(profile) {
    var memberDiv = document.createElement('div');
    memberDiv.className = 'clan-member';

    var row = document.createElement('div');
    row.className = 'clan-member-row';

    var nameSpan = document.createElement('span');
    nameSpan.className = 'clan-member-name';
    nameSpan.textContent = profile.display_name + (profile.id === currentUser.id ? ' (you)' : '');

    var timeSpan = document.createElement('span');
    timeSpan.className = 'clan-member-time';
    var localInfo = getLocalTimeInfo(profile.timezone);
    timeSpan.textContent = localInfo.text;
    if (localInfo.isNight) timeSpan.classList.add('is-night');

    row.appendChild(nameSpan);
    row.appendChild(timeSpan);
    memberDiv.appendChild(row);

    var track = document.createElement('div');
    track.className = 'clan-mini-track';
    var memberBlocks = rulerMap[profile.id] || [];

    if (memberBlocks.length) {
      memberBlocks.forEach(function(b) {
        var miniBlock = document.createElement('div');
        miniBlock.className = 'clan-mini-block' + (b.sleep ? ' sleep-zone' : '');
        miniBlock.style.width = ((b.minutes / 1440) * 100) + '%';
        track.appendChild(miniBlock);
      });
    }
    memberDiv.appendChild(track);
    container.appendChild(memberDiv);
  });
}

function getLocalTimeInfo(timezone) {
  try {
    var now = new Date();
    var timeStr = now.toLocaleTimeString('en-US', { timeZone: timezone, hour: '2-digit', minute: '2-digit' });
    var hourStr = now.toLocaleTimeString('en-US', { timeZone: timezone, hour: 'numeric', hour12: false });
    var hour = parseInt(hourStr, 10);
    var isNight = (hour < 7 || hour >= 22);
    return { text: timeStr, isNight: isNight };
  } catch (e) {
    return { text: '—', isNight: false };
  }
}

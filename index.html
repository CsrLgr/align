<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>CSR Align</title>
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#1a1a1a">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: #0d0d0d;
    color: #eee;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Georgia, serif;
    padding: 2rem;
  }
  .header {
    text-align: center;
    margin-bottom: 2rem;
  }
  .header h1 {
    font-size: 28px;
    margin-bottom: 0.5rem;
  }
  .header p {
    font-size: 13px;
    color: #999;
  }
  .ruler-section {
    margin-bottom: 3rem;
  }
  .ruler-label {
    font-size: 12px;
    color: #999;
    margin-bottom: 0.75rem;
    text-transform: uppercase;
    letter-spacing: 1px;
  }
  .ruler-container {
    display: flex;
    height: 120px;
    border-radius: 12px;
    overflow: hidden;
    border: 1px solid #333;
    background: #1a1a1a;
  }
  .block {
    flex: 1;
    position: relative;
    border-right: 1px solid #222;
    cursor: col-resize;
    display: flex;
    align-items: flex-end;
    justify-content: center;
    padding-bottom: 12px;
    transition: background 0.2s;
    user-select: none;
  }
  .block:last-child { border-right: none; }
  .block.sleep {
    background: #a32d2d;
  }
  .block.sleep:hover {
    background: #b83c3c;
  }
  .block:not(.sleep) {
    background: #2a2a2a;
  }
  .block:not(.sleep):hover {
    background: #3a3a3a;
  }
  .block-label {
    font-size: 11px;
    color: #aaa;
    text-align: center;
    writing-mode: vertical-rl;
    transform: rotate(180deg);
    max-width: 80%;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }
  .block.sleep .block-label {
    color: #fff;
    font-weight: bold;
  }
  .work-section {
    margin-bottom: 2rem;
  }
  .section-label {
    font-size: 12px;
    color: #999;
    margin-bottom: 0.75rem;
    text-transform: uppercase;
    letter-spacing: 1px;
  }
  .info-bar {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 1rem;
    font-size: 13px;
  }
  .info-bar .time {
    color: #c0b5a5;
    font-weight: 500;
  }
  .info-bar .block-name {
    color: #999;
  }
  textarea {
    width: 100%;
    min-height: 200px;
    background: #1a1a1a;
    border: 1px solid #333;
    border-radius: 8px;
    padding: 1rem;
    color: #eee;
    font-family: Georgia, serif;
    font-size: 14px;
    resize: vertical;
  }
  textarea:focus {
    outline: none;
    border-color: #c0b5a5;
  }
  .button-group {
    display: flex;
    gap: 1rem;
    margin-top: 1rem;
  }
  button {
    flex: 1;
    padding: 0.75rem 1rem;
    background: #c0b5a5;
    color: #0d0d0d;
    border: none;
    border-radius: 8px;
    font-weight: 600;
    cursor: pointer;
    font-size: 14px;
    transition: background 0.2s;
  }
  button:hover {
    background: #d0c5b5;
  }
  .journal-list {
    margin-top: 2rem;
  }
  .journal-entry {
    background: #1a1a1a;
    border: 1px solid #333;
    border-radius: 8px;
    padding: 1.5rem;
    margin-bottom: 1rem;
  }
  .entry-date {
    font-size: 12px;
    color: #999;
    margin-bottom: 0.5rem;
  }
  .entry-text {
    font-size: 14px;
    line-height: 1.6;
    color: #ddd;
  }
</style>
</head>
<body>
<div class="header">
  <h1>CSR Align</h1>
  <p>Your 12-block day planner</p>
</div>

<div class="ruler-section">
  <div class="ruler-label">Today's Schedule</div>
  <div class="ruler-container" id="rulerContainer"></div>
</div>

<div class="work-section">
  <div class="section-label">Current Block</div>
  <div class="info-bar">
    <span class="block-name" id="blockName">—</span>
    <span class="time" id="blockTime">—</span>
  </div>
  <textarea id="workArea" placeholder="Write your day here..."></textarea>
  <div class="button-group">
    <button id="saveBtn">Save Entry</button>
    <button id="newDayBtn">New Day</button>
  </div>
</div>

<div class="journal-section">
  <div class="section-label">Past Entries</div>
  <div class="journal-list" id="journalList"></div>
</div>

<script>
const STORAGE_KEY = 'csr_align_data';
const TOTAL_MINUTES = 1440;
const BLOCK_COUNT = 12;
const SLEEP_MINUTES = 420;

let state = {
  blocks: [],
  currentDate: new Date().toDateString(),
  entries: {}
};

function initState() {
  const saved = localStorage.getItem(STORAGE_KEY);
  if (saved) {
    state = JSON.parse(saved);
  } else {
    state.blocks = Array(BLOCK_COUNT).fill(120).map((min, i) => ({
      id: i,
      minutes: min,
      name: `Block ${i + 1}`
    }));
  }
  if (!state.entries) state.entries = {};
}

function saveState() {
  localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
}

function renderRuler() {
  const container = document.getElementById('rulerContainer');
  container.innerHTML = '';
  
  const totalMins = state.blocks.reduce((sum, b) => sum + b.minutes, 0);
  const sleepStartMin = totalMins - SLEEP_MINUTES;
  
  let elapsedMin = 0;
  state.blocks.forEach((block, idx) => {
    const div = document.createElement('div');
    div.className = 'block';
    const blockEndMin = elapsedMin + block.minutes;
    const isSleep = blockEndMin > sleepStartMin;
    if (isSleep) div.classList.add('sleep');
    
    const label = document.createElement('div');
    label.className = 'block-label';
    label.textContent = block.name;
    div.appendChild(label);
    
    // Dragging
    div.addEventListener('mousedown', (e) => startDrag(e, idx));
    container.appendChild(div);
    elapsedMin = blockEndMin;
  });
}

function startDrag(e, blockIdx) {
  const startX = e.clientX;
  const startMinutes = state.blocks[blockIdx].minutes;
  
  function onMouseMove(e2) {
    const deltaX = e2.clientX - startX;
    const deltaMin = Math.round((deltaX / window.innerWidth) * TOTAL_MINUTES);
    const newMin = Math.max(30, startMinutes + deltaMin);
    
    const totalOthers = state.blocks.reduce((sum, b, i) => i !== blockIdx ? sum + b.minutes : sum, 0);
    if (newMin + totalOthers <= TOTAL_MINUTES) {
      state.blocks[blockIdx].minutes = newMin;
      renderRuler();
      updateCurrentBlock();
      saveState();
    }
  }
  
  function onMouseUp() {
    document.removeEventListener('mousemove', onMouseMove);
    document.removeEventListener('mouseup', onMouseUp);
  }
  
  document.addEventListener('mousemove', onMouseMove);
  document.addEventListener('mouseup', onMouseUp);
}

function getCurrentBlock() {
  const now = new Date();
  const realMinutes = now.getHours() * 60 + now.getMinutes();
  const sinceSix = (realMinutes - 360 + 1440) % 1440;
  
  let elapsedMin = 0;
  for (let i = 0; i < state.blocks.length; i++) {
    const blockEndMin = elapsedMin + state.blocks[i].minutes;
    if (sinceSix < blockEndMin) {
      return { blockIdx: i, minutesInBlock: sinceSix - elapsedMin, totalMinInBlock: state.blocks[i].minutes };
    }
    elapsedMin = blockEndMin;
  }
  return { blockIdx: 0, minutesInBlock: 0, totalMinInBlock: state.blocks[0].minutes };
}

function updateCurrentBlock() {
  const { blockIdx, minutesInBlock, totalMinInBlock } = getCurrentBlock();
  const block = state.blocks[blockIdx];
  document.getElementById('blockName').textContent = block.name;
  document.getElementById('blockTime').textContent = `${Math.floor(minutesInBlock)} / ${totalMinInBlock} min`;
}

document.getElementById('saveBtn').addEventListener('click', () => {
  const text = document.getElementById('workArea').value;
  if (!text.trim()) return;
  
  const dateStr = state.currentDate;
  if (!state.entries[dateStr]) state.entries[dateStr] = [];
  state.entries[dateStr].push({
    timestamp: new Date().toISOString(),
    text: text
  });
  
  document.getElementById('workArea').value = '';
  saveState();
  renderJournal();
});

document.getElementById('newDayBtn').addEventListener('click', () => {
  state.currentDate = new Date().toDateString();
  document.getElementById('workArea').value = '';
  saveState();
  renderJournal();
});

function renderJournal() {
  const list = document.getElementById('journalList');
  list.innerHTML = '';
  
  const allEntries = [];
  Object.keys(state.entries).forEach(dateStr => {
    state.entries[dateStr].forEach(entry => {
      allEntries.push({ dateStr, ...entry });
    });
  });
  
  allEntries.sort((a, b) => new Date(b.timestamp) - new Date(a.timestamp));
  
  allEntries.slice(0, 10).forEach(entry => {
    const div = document.createElement('div');
    div.className = 'journal-entry';
    div.innerHTML = `
      <div class="entry-date">${entry.dateStr}</div>
      <div class="entry-text">${entry.text.substring(0, 150)}...</div>
    `;
    list.appendChild(div);
  });
}

// Init
initState();
renderRuler();
updateCurrentBlock();
renderJournal();

setInterval(updateCurrentBlock, 5000);
</script>
</body>
</html>
